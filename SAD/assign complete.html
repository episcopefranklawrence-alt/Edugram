<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGram - Completed Assignments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assign complete.css">
</head>
<body>

  <div class="dashboard-wrapper">
    
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-header">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
            </svg>
          </div>
          <span class="brand-name">EduGram</span>
        </div>

        <nav class="navigation">
          <a href="#" class="nav-item">
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">✍️</span> Writing Assistant
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">📄</span> My Documents
          </a>
          <a href="#" class="nav-item active">
            <span class="nav-icon">📅</span> Assignments
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">⚙️</span> Settings
          </a>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="user-avatar">U</div>
        <div class="user-info">
          <span class="user-name">User</span>
          <span class="user-email">aj@gmail.com</span>
          <span class="badge-student">student</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      
      <header class="content-header">
        <h1>Assignments</h1>
        <p>View and submit your assignments</p>
      </header>

      <div class="tabs-container">
        <button class="tab-btn">Active</button>
        <button class="tab-btn active">Completed</button>
      </div>

      <section class="assignments-list">
        
        <div class="assignment-card completed-card">
          
          <div class="card-main-row">
            <div class="card-left-block">
              <div class="assignment-icon-box">📋</div>
              <div class="assignment-details">
                <h3>Literature Analysis</h3>
                <p class="subject-tag">English Literature</p>
                
                <div class="card-meta-row">
                  <span class="meta-item"><span class="icon">📅</span> Due: Jan 18, 2024</span>
                  <span class="meta-item status-submitted">
                    <svg class="check-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                    </svg>
                    Submitted
                  </span>
                  <span class="badge-grade">Grade:</span>
                </div>
              </div>
            </div>
            
            <button class="btn-attach">
              <span class="plus-icon">+</span> Attach File
            </button>
          </div>

          <div class="attachments-section">
            <div class="attachments-header">
              <span class="paperclip-icon">📎</span> Attached files (1)
            </div>
            
            <div class="file-chip-row">
              <div class="file-info">
                <span class="file-icon">📄</span>
                <span class="file-name">literature_analysis.pdf</span>
                <span class="file-size">245 KB</span>
              </div>
              <button class="btn-remove-file" aria-label="Remove file">&times;</button>
            </div>
          </div>

        </div>

      </section>
    </main>

  </div>

</body>
</html>
